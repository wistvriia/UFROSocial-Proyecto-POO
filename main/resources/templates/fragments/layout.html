<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<!-- ===================== HEAD ===================== -->
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' · UFRO Social'">UFRO Social</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<!-- ===================== NAVBAR ===================== -->
<header th:fragment="navbar" class="navbar">
    <div class="nav-inner">
        <a class="brand" th:href="@{/}">🦊 UFRO<span>Social</span></a>

        <!-- Buscador de usuarios y publicaciones -->
        <form class="search" th:action="@{/}" method="get">
            <input type="text" name="q" placeholder="Buscar usuarios o publicaciones..."
                   th:value="${q}">
            <button type="submit">Buscar</button>
        </form>

        <!-- Menu de carreras (filtro) -->
        <div class="dropdown">
            <button class="dropbtn">Carreras ▾</button>
            <div class="dropdown-content">
                <a th:href="@{/}">Todas las carreras</a>
                <a th:each="c : ${carrerasMenu}"
                   th:href="@{/(carrera=${c.name()})}"
                   th:text="${c.nombreLegible}">Carrera</a>
            </div>
        </div>

        <!-- Menu de usuario -->
        <div class="dropdown" th:if="${usuarioActual != null}">
            <button class="dropbtn">
                <img class="avatar-sm" th:if="${usuarioActual.fotoPerfilUrl != null}"
                     th:src="${usuarioActual.fotoPerfilUrl}" alt="foto">
                <span th:text="'@' + ${usuarioActual.username}">@usuario</span> ▾
            </button>
            <div class="dropdown-content right">
                <a th:href="@{'/perfil/' + ${usuarioActual.username}}">Mi perfil</a>
                <a th:href="@{/perfil/editar}">Editar perfil</a>
                <a th:href="@{/perfil/password}">Cambiar contraseña</a>
                <a th:href="@{/logout}" class="danger">Cerrar sesión</a>
            </div>
        </div>
    </div>
</header>

</body>
</html>
