<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Feed')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">

    <!-- Crear publicacion -->
    <section class="card">
        <h3>¿Qué estás pensando? 🦊</h3>
        <form th:action="@{/publicaciones/crear}" th:object="${nuevaPublicacion}"
              method="post" enctype="multipart/form-data">
            <div class="form-group">
                <textarea th:field="*{texto}" placeholder="Escribe tu publicación..." required></textarea>
            </div>
            <div class="form-group">
                <label>Tag de carrera (opcional)</label>
                <select th:field="*{carreraTag}">
                    <option th:value="${null}">Sin tag (solo feed general)</option>
                    <option th:each="c : ${carrerasMenu}"
                            th:value="${c.name()}" th:text="${c.nombreLegible}">Carrera</option>
                </select>
            </div>
            <div class="form-group">
                <label>Imagen (opcional)</label>
                <input type="file" name="imagen" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primario">Publicar</button>
        </form>
    </section>

    <!-- Info de filtro / busqueda activa -->
    <div class="filtro-info" th:if="${carreraSeleccionada != null}">
        Mostrando publicaciones de: <strong th:text="${carreraSeleccionada.nombreLegible}">Carrera</strong>.
        <a th:href="@{/}">Ver todas</a>
    </div>
    <div class="filtro-info" th:if="${q != null and !q.isEmpty()}">
        Resultados de búsqueda para: <strong th:text="${q}">texto</strong>.
        <a th:href="@{/}">Limpiar</a>
    </div>

    <!-- Resultados de usuarios (solo en busqueda) -->
    <section class="card" th:if="${usuariosEncontrados != null and !usuariosEncontrados.isEmpty()}">
        <h3>Usuarios encontrados</h3>
        <div th:each="u : ${usuariosEncontrados}" style="margin:6px 0">
            <a th:href="@{'/perfil/' + ${u.username}}" th:text="'@' + ${u.username}">@usuario</a>
            <span class="muted" th:text="' — ' + ${u.nombreCompleto}"></span>
            <span class="muted" th:if="${u.carrera != null}" th:text="' (' + ${u.carrera.nombreLegible} + ')'"></span>
        </div>
    </section>

    <!-- Feed de publicaciones -->
    <div th:if="${publicaciones.isEmpty()}" class="empty card">
        No hay publicaciones para mostrar todavía. ¡Sé el primero en publicar!
    </div>

    <th:block th:each="pub : ${publicaciones}">
        <div th:replace="~{fragments/publicacion :: publicacion(${pub})}"></div>
    </th:block>

</main>
</body>
</html>
