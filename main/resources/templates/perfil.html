<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Perfil')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">

    <section class="card">
        <div class="perfil-head">
            <img class="avatar" th:if="${perfil.fotoPerfilUrl != null}"
                 th:src="${perfil.fotoPerfilUrl}" alt="foto"
                 style="object-fit:cover">
            <div class="avatar" th:unless="${perfil.fotoPerfilUrl != null}"
                 th:text="${#strings.toUpperCase(#strings.substring(perfil.username,0,1))}">U</div>

            <div class="perfil-datos">
                <h1 th:text="${perfil.nombreCompleto}">Nombre</h1>
                <div class="muted" th:text="'@' + ${perfil.username}">@usuario</div>
                <div class="muted" th:if="${perfil.carrera != null}" th:text="${perfil.carrera.nombreLegible}">Carrera</div>
            </div>
        </div>

        <p th:if="${perfil.biografia != null and !perfil.biografia.isEmpty()}"
           th:text="${perfil.biografia}" style="margin-top:14px">Biografía</p>

        <div class="muted" style="font-size:.8rem; margin-top:8px">
            <span>Correo: </span><span th:text="${perfil.email}">correo</span> ·
            <span>Miembro desde </span>
            <span th:text="${#temporals.format(perfil.fechaCreacion, 'dd-MM-yyyy')}">fecha</span>
        </div>

        <div style="margin-top:14px" th:if="${usuarioActual != null and usuarioActual.id == perfil.id}">
            <a class="btn" th:href="@{/perfil/editar}">Editar perfil</a>
            <a class="btn" th:href="@{/perfil/password}">Cambiar contraseña</a>
        </div>
    </section>

    <h3>Publicaciones de @<span th:text="${perfil.username}">usuario</span></h3>

    <div th:if="${publicaciones.isEmpty()}" class="empty card">
        Este usuario aún no tiene publicaciones.
    </div>

    <th:block th:each="pub : ${publicaciones}">
        <div th:replace="~{fragments/publicacion :: publicacion(${pub})}"></div>
    </th:block>

</main>
</body>
</html>
