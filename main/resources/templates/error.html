<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">
    <section class="card center">
        <h1 style="font-size:3rem; margin:0" th:text="${codigo} ?: 'Error'">Error</h1>
        <h2 th:text="${titulo} ?: 'Ha ocurrido un error'">Ha ocurrido un error</h2>
        <p class="muted" th:text="${mensaje} ?: 'No fue posible completar la operación.'">Detalle</p>
        <a class="btn btn-primario" th:href="@{/}">Volver al inicio</a>
    </section>
</main>
</body>
</html>
