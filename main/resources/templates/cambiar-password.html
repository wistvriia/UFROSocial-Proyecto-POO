<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Cambiar contraseña')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">
    <section class="card">
        <h2>Cambiar contraseña</h2>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-ok" th:if="${exito}" th:text="${exito}"></div>

        <form th:action="@{/perfil/password}" th:object="${cambioPasswordForm}" method="post">
            <div class="form-group">
                <label for="passwordActual">Contraseña actual</label>
                <input type="password" id="passwordActual" th:field="*{passwordActual}" required>
            </div>
            <div class="form-group">
                <label for="passwordNueva">Nueva contraseña</label>
                <input type="password" id="passwordNueva" th:field="*{passwordNueva}"
                       minlength="8" maxlength="16" required>
                <div class="hint">Entre 8 y 16 caracteres.</div>
            </div>
            <button type="submit" class="btn btn-primario">Actualizar contraseña</button>
            <a class="btn" th:href="@{/}">Volver</a>
        </form>
    </section>
</main>
</body>
</html>
