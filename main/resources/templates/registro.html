<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Registro')}"></head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">🎓</div>
        <h1>Crear cuenta</h1>
        <p class="center muted">Solo correos <strong>@ufromail.cl</strong></p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/registro}" th:object="${registroForm}" method="post">
            <div class="form-group">
                <label for="nombreCompleto">Nombre completo</label>
                <input type="text" id="nombreCompleto" th:field="*{nombreCompleto}" required>
            </div>
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" th:field="*{username}" required>
            </div>
            <div class="form-group">
                <label for="email">Correo institucional</label>
                <input type="email" id="email" th:field="*{email}"
                       placeholder="tucorreo@ufromail.cl" required>
            </div>
            <div class="form-group">
                <label for="carrera">Carrera</label>
                <select id="carrera" th:field="*{carrera}">
                    <option th:value="${null}">-- Selecciona tu carrera --</option>
                    <option th:each="c : ${carreras}"
                            th:value="${c.name()}" th:text="${c.nombreLegible}">Carrera</option>
                </select>
            </div>
            <div class="form-group">
                <label for="biografia">Biografía (opcional)</label>
                <textarea id="biografia" th:field="*{biografia}"></textarea>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" th:field="*{password}"
                       minlength="8" maxlength="16" required>
                <div class="hint">Entre 8 y 16 caracteres.</div>
            </div>
            <button type="submit" class="btn btn-primario" style="width:100%">Registrarme</button>
        </form>

        <p class="center" style="margin-top:16px">
            ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>
        </p>
    </div>
</div>
</body>
</html>
