<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Iniciar sesión')}"></head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">🎓</div>
        <h1>UFRO Social</h1>
        <p class="center muted">Red social exclusiva para estudiantes UFRO</p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post">
            <div class="form-group">
                <label for="email">Correo institucional</label>
                <input type="email" id="email" th:field="*{email}"
                       placeholder="tucorreo@ufromail.cl" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" th:field="*{password}" required>
            </div>
            <button type="submit" class="btn btn-primario" style="width:100%">Iniciar sesión</button>
        </form>

        <p class="center" style="margin-top:16px">
            ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a>
        </p>
    </div>
</div>
</body>
</html>
