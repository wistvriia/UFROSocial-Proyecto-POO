<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Editar publicación')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">
    <section class="card">
        <h2>Editar publicación</h2>

        <form th:action="@{'/publicaciones/' + ${publicacionId} + '/editar'}"
              th:object="${publicacionForm}" method="post">
            <div class="form-group">
                <label for="texto">Texto</label>
                <textarea id="texto" th:field="*{texto}" required></textarea>
            </div>
            <div class="form-group">
                <label for="carreraTag">Tag de carrera (opcional)</label>
                <select id="carreraTag" th:field="*{carreraTag}">
                    <option th:value="${null}">Sin tag</option>
                    <option th:each="c : ${carreras}"
                            th:value="${c.name()}" th:text="${c.nombreLegible}">Carrera</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primario">Guardar cambios</button>
            <a class="btn" th:href="@{/}">Cancelar</a>
        </form>
    </section>
</main>
</body>
</html>
