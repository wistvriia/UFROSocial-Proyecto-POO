<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>

<!-- Fragmento que renderiza una publicacion completa con sus comentarios -->
<article th:fragment="publicacion(pub)" class="card" th:id="'pub-' + ${pub.id}">

    <div class="pub-head">
        <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(pub.autorUsername,0,1))}">U</div>
        <div>
            <a class="pub-autor" th:href="@{'/perfil/' + ${pub.autorUsername}}"
               th:text="'@' + ${pub.autorUsername}">@autor</a>
            <div class="pub-meta">
                <span th:text="${#temporals.format(pub.fechaCreacion, 'dd-MM-yyyy HH:mm')}">fecha</span>
                <span th:if="${pub.editada}"> · editada</span>
            </div>
        </div>
        <span class="tag" th:if="${pub.tieneTag()}" th:text="${pub.carreraTag.nombreLegible}">Carrera</span>
    </div>

    <p class="pub-texto" th:text="${pub.texto}">Texto de la publicación</p>
    <img class="pub-img" th:if="${pub.imagenUrl != null}" th:src="${pub.imagenUrl}" alt="imagen">

    <!-- Reacciones + acciones de propietario -->
    <div class="acciones">
        <form class="inline-form" th:action="@{'/publicaciones/' + ${pub.id} + '/reaccionar'}" method="post">
            <input type="hidden" name="tipo" value="LIKE">
            <button type="submit" class="btn"
                    th:classappend="${usuarioActual != null and pub.reaccionDe(usuarioActual.id) != null and pub.reaccionDe(usuarioActual.id).name() == 'LIKE'} ? 'activo-like' : ''">
                👍 <span th:text="${pub.contarLikes()}">0</span>
            </button>
        </form>
        <form class="inline-form" th:action="@{'/publicaciones/' + ${pub.id} + '/reaccionar'}" method="post">
            <input type="hidden" name="tipo" value="DISLIKE">
            <button type="submit" class="btn"
                    th:classappend="${usuarioActual != null and pub.reaccionDe(usuarioActual.id) != null and pub.reaccionDe(usuarioActual.id).name() == 'DISLIKE'} ? 'activo-dislike' : ''">
                👎 <span th:text="${pub.contarDislikes()}">0</span>
            </button>
        </form>

        <span class="spacer"></span>

        <th:block th:if="${usuarioActual != null and pub.autorId == usuarioActual.id}">
            <a class="btn" th:href="@{'/publicaciones/' + ${pub.id} + '/editar'}">✏️ Editar</a>
            <form class="inline-form" th:action="@{'/publicaciones/' + ${pub.id} + '/eliminar'}" method="post"
                  onsubmit="return confirm('¿Eliminar esta publicación?');">
                <button type="submit" class="btn btn-peligro">🗑 Eliminar</button>
            </form>
        </th:block>
    </div>

    <!-- Comentarios -->
    <div class="comentarios">
        <div class="comentario" th:each="c : ${pub.comentarios}">
            <div>
                <a class="autor" th:href="@{'/perfil/' + ${c.autorUsername}}"
                   th:text="'@' + ${c.autorUsername}">@autor</a>
                <span class="pub-meta" th:text="' · ' + ${#temporals.format(c.fechaCreacion, 'dd-MM-yyyy HH:mm')}"></span>
            </div>
            <div th:text="${c.texto}">comentario</div>

            <!-- Respuestas (tercer y ultimo nivel) -->
            <div class="respuesta" th:each="r : ${c.respuestas}">
                <a class="autor" th:href="@{'/perfil/' + ${r.autorUsername}}"
                   th:text="'@' + ${r.autorUsername}">@autor</a>
                <span th:text="' · ' + ${r.texto}">respuesta</span>
            </div>

            <!-- Form para responder al comentario -->
            <form class="comentar-form"
                  th:action="@{'/publicaciones/' + ${pub.id} + '/comentarios/' + ${c.id} + '/responder'}"
                  method="post">
                <input type="text" name="texto" placeholder="Responder..." required>
                <button type="submit" class="btn">Responder</button>
            </form>
        </div>

        <!-- Form para comentar la publicacion -->
        <form class="comentar-form" th:action="@{'/publicaciones/' + ${pub.id} + '/comentar'}" method="post">
            <input type="text" name="texto" placeholder="Escribe un comentario..." required>
            <button type="submit" class="btn btn-primario">Comentar</button>
        </form>
    </div>
</article>

</body>
</html>
